<main class="fp-shell">
  <div class="fp-bg-grid"></div>
  <div class="fp-card">
    <div class="fp-logo">
      <img src="/icono.png" alt="ParkingNow" style="width:40px;height:40px;object-fit:contain" />
      <span style="font-size:18px;font-weight:700;color:#001558">ParkingNow</span>
    </div>
    <h2 style="margin:16px 0 8px;font-size:20px">Password Recovery</h2>
    <p style="color:#444652;font-size:14px;margin-bottom:24px">
      To change your password, sign in and navigate to
      <strong>Settings → Change Password</strong>.
    </p>
    <a routerLink="/iam/sign-in"
      style="display:inline-flex;align-items:center;gap:6px;padding:10px 20px;background:#00268a;color:#fff;border-radius:10px;text-decoration:none;font-weight:600;font-size:14px"
      aria-label="Back to sign in">
      ← Back to Sign In
    </a>
  </div>
</main>
